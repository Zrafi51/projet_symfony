[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.intl", "php82Extensions.zip", "php82Extensions.gd", "php82Extensions.tokenizer", "php82Extensions.ctype", "php82Extensions.iconv", "composer"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = [
  "php bin/console cache:clear --env=prod --no-debug",
  "php bin/console assets:install --env=prod"
]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public/"
