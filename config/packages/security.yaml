security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        forum_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        forum:
            pattern: ^/social
            lazy: true
            provider: forum_user_provider
            form_login:
                login_path: forum_login
                check_path: forum_login
                default_target_path: forum_forum
                enable_csrf: true
            logout:
                path: forum_logout
                target: forum_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
        main:
            lazy: true

    role_hierarchy:
        ROLE_ADMIN: ROLE_USER

    access_control:
        - { path: ^/social/login, roles: PUBLIC_ACCESS }
        - { path: ^/social/register, roles: PUBLIC_ACCESS }
        - { path: ^/social/ai/suggest, roles: PUBLIC_ACCESS }
        - { path: ^/social/admin, roles: ROLE_ADMIN }
        - { path: ^/social, roles: ROLE_USER }
