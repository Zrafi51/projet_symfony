# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.templates_dir: '%kernel.project_dir%/templates'
    app.remember_me_cookie_name: 'easytravel_device_key'
    app.remember_me_duration_days: 30
    posts_directory: '%kernel.project_dir%/public/uploads/posts'
    profiles_directory: '%kernel.project_dir%/public/uploads/profiles'
    videos_directory: '%kernel.project_dir%/public/uploads/videos'
    music_directory: '%kernel.project_dir%/public/uploads/music'
    stories_directory: '%kernel.project_dir%/public/uploads/stories'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Database\PdoConnectionFactory:
        arguments:
            $host: '%env(DB_HOST)%'
            $port: '%env(int:DB_PORT)%'
            $database: '%env(DB_NAME)%'
            $user: '%env(DB_USER)%'
            $password: '%env(DB_PASSWORD)%'

    App\View\PhpTemplateRenderer:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\LegacyRememberMeService:
        arguments:
            $secret: '%kernel.secret%'
            $cookieName: '%app.remember_me_cookie_name%'
            $durationDays: '%app.remember_me_duration_days%'

    App\Service\ProfilePhotoStorageService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\SponsorLogoStorageService:
        arguments:
            $projectDir: '%kernel.project_dir%'


    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

